name: Docusaurus LLM Translation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.mdx'
      - 'docs/**/*.md'
      - 'whatsnew/**/*.mdx'
      - 'whatsnew/**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # The script requires the 'requests' library to speak with the LLM API
      - name: Install Dependencies
        run: pip install requests

      # Bypasses the missing action.yml by downloading the script file directly
      - name: Download Translation Script
        run: |
          curl -sSLo translate.py https://raw.githubusercontent.com/ardigan6/docusaurus-llm-translator/main/translate.py

      # Identifies exactly which files changed in the /docs folder
      - name: Get Changed Docs Files
        id: changed-docs-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            docs/**/*.md
            docs/**/*.mdx

      # Identifies exactly which files changed in the /whatsnew folder
      - name: Get Changed WhatsNew Files
        id: changed-whatsnew-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            whatsnew/**/*.md
            whatsnew/**/*.mdx

      # --------------------------------------------------------
      # STEP 1: Translate changed files in standard /docs directory
      # --------------------------------------------------------
      - name: Translate Core Docs
        if: steps.changed-docs-files.outputs.any_changed == 'true'
        env:
          API_KEY: ${{ secrets.LLM_API_KEY }}
          API_ENDPOINT_URL: ${{ secrets.LLM_API_ENDPOINT_URL }}
        run: |
          python3 translate.py \
            --source-docs-dir docs \
            --docs-plugin-path docusaurus-plugin-content-docs/current \
            --cache-file docs_cache.json \
            --languages pt es \
            ${{ steps.changed-docs-files.outputs.all_changed_files }}

      # --------------------------------------------------------
      # STEP 2: Translate changed files in /whatsnew directory
      # --------------------------------------------------------
      - name: Translate WhatsNew (Blog)
        if: steps.changed-whatsnew-files.outputs.any_changed == 'true'
        env:
          API_KEY: ${{ secrets.LLM_API_KEY }}
          API_ENDPOINT_URL: ${{ secrets.LLM_API_ENDPOINT_URL }}
        run: |
          python3 translate.py \
            --source-docs-dir whatsnew \
            --docs-plugin-path docusaurus-plugin-content-blog \
            --cache-file whatsnew_cache.json \
            --languages pt es \
            ${{ steps.changed-whatsnew-files.outputs.all_changed_files }}

      # Clean up the script so it isn't accidentally committed to your PR
      - name: Cleanup Script
        run: rm -f translate.py

      # --------------------------------------------------------
      # STEP 3: Bundle up the output and submit a Pull Request
      # --------------------------------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-translate updated docs and whatsnew files via LLM"
          branch: "automated-translations"
          base: "main"
          title: "docs: Automated LLM Translations Update"
          body: |
            This is an automated pull request containing newly generated translations for your standard documentation and `/whatsnew` content.
            
            Please review the markdown updates inside the `i18n/` directory before merging.
          labels: |
            documentation
            automated-pr
