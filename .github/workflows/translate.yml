name: Docusaurus LLM Translation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.mdx'
      - 'docs/**/*.md'
      - 'whatsnew/**/*.mdx'
      - 'whatsnew/**/*.md'
  workflow_dispatch:
    inputs:
      translate_all_files:
        description: 'Check this to sweep and translate EVERY file (One-off task)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  translate_site:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [pt, es]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Download Translation Script
        run: |
          curl -sSLo translate.py https://raw.githubusercontent.com/nicopace/docusaurus-llm-translator/refs/heads/main/translate.py
          # Patching the model directly inside the downloaded script to ensure it uses the working stable endpoint
          sed -i 's/gemini-2.5-flash-preview-05-20/gemini-2.5-flash/g' translate.py

      # --- FILE DETECTION (Only run on push or if manual trigger isn't full sweep) ---
      - name: Get Changed Docs Files
        if: ${{ github.event.inputs.translate_all_files != 'true' }}
        id: changed-docs-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            docs/**/*.md
            docs/**/*.mdx

      - name: Get Changed WhatsNew Files
        if: ${{ github.event.inputs.translate_all_files != 'true' }}
        id: changed-whatsnew-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            whatsnew/**/*.md
            whatsnew/**/*.mdx

      # --------------------------------------------------------
      # STEP 1: Translate /docs directory
      # --------------------------------------------------------
      - name: Translate Core Docs
        if: ${{ github.event.inputs.translate_all_files == 'true' || steps.changed-docs-files.outputs.any_changed == 'true' }}
        env:
          API_KEY: ${{ secrets.LLM_API_KEY }}
          API_ENDPOINT_URL: ${{ secrets.LLM_API_ENDPOINT_URL }}
        run: |
          # Use a bash conditional to determine if we provide specific files or the full wildcards
          if [ "${{ github.event.inputs.translate_all_files }}" = "true" ]; then
            # Enable globbing options so wildcards match nested directories correctly
            shopt -s globstar nullglob
            TARGET_FILES=( docs/**/*.md docs/**/*.mdx )
          else
            TARGET_FILES=( ${{ steps.changed-docs-files.outputs.all_changed_files }} )
          fi
          
          python3 translate.py \
            --source-docs-dir ./docs \
            --i18n-root ./i18n \
            --cache-file docs_cache_${{ matrix.language }}.json \
            --languages ${{ matrix.language }} \
            --docs-plugin-path "docusaurus-plugin-content-docs/current" \
            "${TARGET_FILES[@]}"

      # --------------------------------------------------------
      # STEP 2: Translate /whatsnew directory
      # --------------------------------------------------------
      - name: Translate WhatsNew (Blog)
        if: ${{ github.event.inputs.translate_all_files == 'true' || steps.changed-whatsnew-files.outputs.any_changed == 'true' }}
        env:
          API_KEY: ${{ secrets.LLM_API_KEY }}
          API_ENDPOINT_URL: ${{ secrets.LLM_API_ENDPOINT_URL }}
        run: |
          if [ "${{ github.event.inputs.translate_all_files }}" = "true" ]; then
            shopt -s globstar nullglob
            TARGET_FILES=( whatsnew/**/*.md whatsnew/**/*.mdx )
          else
            TARGET_FILES=( ${{ steps.changed-whatsnew-files.outputs.all_changed_files }} )
          fi
          
          python3 translate.py \
            --source-docs-dir ./whatsnew \
            --i18n-root ./i18n \
            --cache-file whatsnew_cache_${{ matrix.language }}.json \
            --languages ${{ matrix.language }} \
            --docs-plugin-path "docusaurus-plugin-content-blog" \
            "${TARGET_FILES[@]}"

      - name: Cleanup Script
        run: rm -f translate.py

      # --------------------------------------------------------
      # STEP 3: Bundle up the output and submit a Pull Request per language
      # --------------------------------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-translate updated docs and whatsnew files to ${{ matrix.language }} via LLM"
          branch: "automated-translations-${{ matrix.language }}"
          base: "main"
          title: "docs: Automated LLM Translations Update (${{ matrix.language }})"
          body: |
            This is an automated pull request containing newly generated translations for the language: `${{ matrix.language }}`.
            
            Please review the markdown updates inside the `i18n/${{ matrix.language }}/` directory before merging.
          labels: |
            documentation
            automated-pr
            translation-${{ matrix.language }}
