name: Docusaurus LLM Translation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.mdx'
      - 'docs/**/*.md'
      - 'whatsnew/**/*.mdx'
      - 'whatsnew/**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate_site:
    runs-on: ubuntu-latest
    strategy:
      # Creates parallel independent jobs for each language specified here
      matrix:
        language: [pt, es]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      # Bypasses the missing action.yml by downloading the script file directly
      - name: Download Translation Script
        run: |
          curl -sSLo translate.py https://raw.githubusercontent.com/nicopace/docusaurus-llm-translator/refs/heads/main/translate.py

      # Identifies exactly which files changed in the /docs folder
      - name: Get Changed Docs Files
        id: changed-docs-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            docs/**/*.md
            docs/**/*.mdx

      # Identifies exactly which files changed in the /whatsnew folder
      - name: Get Changed WhatsNew Files
        id: changed-whatsnew-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            whatsnew/**/*.md
            whatsnew/**/*.mdx

      # --------------------------------------------------------
      # STEP 1: Translate changed files in standard /docs directory
      # --------------------------------------------------------
      - name: Translate Core Docs
        if: steps.changed-docs-files.outputs.any_changed == 'true'
        env:
          API_KEY: ${{ secrets.LLM_API_KEY }}
          API_ENDPOINT_URL: ${{ secrets.LLM_API_ENDPOINT_URL }}
          SOURCE_DOCS_DIR: "docs"
          DOCS_PLUGIN_PATH: "docusaurus-plugin-content-docs/current"
          I18N_ROOT_DIR: "i18n"
          CACHE_FILE_PATH: "docs_cache_${{ matrix.language }}.json"
          LANGUAGES: ${{ matrix.language }}
        run: |
          python3 translate.py ${{ steps.changed-docs-files.outputs.all_changed_files }}

      # --------------------------------------------------------
      # STEP 2: Translate changed files in /whatsnew directory
      # --------------------------------------------------------
      - name: Translate WhatsNew (Blog)
        if: steps.changed-whatsnew-files.outputs.any_changed == 'true'
        env:
          API_KEY: ${{ secrets.LLM_API_KEY }}
          API_ENDPOINT_URL: ${{ secrets.LLM_API_ENDPOINT_URL }}
          SOURCE_DOCS_DIR: "whatsnew"
          DOCS_PLUGIN_PATH: "docusaurus-plugin-content-blog"
          I18N_ROOT_DIR: "i18n"
          CACHE_FILE_PATH: "whatsnew_cache_${{ matrix.language }}.json"
          LANGUAGES: ${{ matrix.language }}
        run: |
          python3 translate.py ${{ steps.changed-whatsnew-files.outputs.all_changed_files }}

      # Clean up the script so it isn't accidentally committed to your PR
      - name: Cleanup Script
        run: rm -f translate.py

      # --------------------------------------------------------
      # STEP 3: Bundle up the output and submit a Pull Request per language
      # --------------------------------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-translate updated docs and whatsnew files to ${{ matrix.language }} via LLM"
          branch: "automated-translations-${{ matrix.language }}"
          base: "main"
          title: "docs: Automated LLM Translations Update (${{ matrix.language }})"
          body: |
            This is an automated pull request containing newly generated translations for the language: `${{ matrix.language }}`.
            
            Please review the markdown updates inside the `i18n/${{ matrix.language }}/` directory before merging.
          labels: |
            documentation
            automated-pr
            translation-${{ matrix.language }}
